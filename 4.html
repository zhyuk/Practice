<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.0/jquery.min.js"></script>
    <style>
        .btn-notice {
            width: 50px;
            height: 50px;
            border-radius: 100%;
        }

        .notice-box {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            width: 500px;
            height: 400px;
            background-color: lightgreen;
            border: solid 2px rgb(0, 187, 187);
            transform: translate(-50%, -50%);
            text-align: center;
            line-height: 400px;
            transition: all 1s ease;
        }

        .notice-box.active {
            display: block;
        }
    </style>
</head>

<body>
    <button type="button" class="btn-notice">공지사항</button>
    <div class="notice-box">공지사항입니다.</div>

    <script>
        $(function () {
            $(".btn-notice").click(function () {
                $("div").toggleClass("active");
            });
        });
    </script>
</body>

</html>
