<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.0/jquery.min.js"></script>
    <style>
        ul {
            display: flex;
            align-items: center;
            width: 1000px;
            height: 100px;
            background-color: black;
            color: white;
            list-style: none;
        }

        li {
            width: 10%;
            line-height: 100px;
            transition: all .5s ease-in;
        }

        li.active {
            width: 60%;
        }
    </style>
</head>

<body>
    <ul>
        <li class="active">김채원</li>
        <li>사쿠라</li>
        <li>허윤진</li>
        <li>카즈하</li>
        <li>홍은채</li>
    </ul>

    <script>
        $(function () {
            $("li").click(function () {
                $("li").removeClass("active");
                $(this).addClass("active");
            })
        });
    </script>
</body>

</html>
