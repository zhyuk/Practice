<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.0/jquery.min.js"></script>
</head>

<body>
    <!-- jQuer를 활용해 태그, 클래스, 아이디를 제어한다. -->
    <p>hello world!!</p>
    <p class="txt">hello world!!</p>
    <p id="won">hello world!!</p>

    <script>
        // p 태그의 css 속성 중 배경색을 레드로 변경 / ('속성이름','변경값')
        $("p").css("background", "red");
        $(".txt").css("background", "yellow");
        $("#won").css("background", "green");

        // p ~ * : p 요소 뒤에 오는 모든 형제 요소 선택
        // $("p ~ *").css("background", "black");
    </script>
</body>

</html>
